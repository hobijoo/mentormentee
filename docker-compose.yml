version: '3.8'

services:
  jjakseon-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: jjakseon-app
    ports:
      - "3000:3000"
    volumes:
      # Use Docker named volumes instead of bind mounts to avoid HAOS read-only errors
      - jjakseon-db:/app/data
      - jjakseon-uploads:/app/public/uploads
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/bingo.sqlite

volumes:
  jjakseon-db:
  jjakseon-uploads:
